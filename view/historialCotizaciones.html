<style>
  .tally-card-historial {
    background-color: #ffffff !important;
    border: 1px solid #dee2e6 !important;
  }
  .btn-whatsapp {
    background-color: #25d366 !important;
    color: white !important;
    font-weight: 600;
  }
  .btn-whatsapp:hover {
    background-color: #1ebd56 !important;
    opacity: 0.9;
  }
</style>

<div class="container-fluid cotizacion-container mt-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-11 col-lg-10 col-xl-9 card-wrapper">
      <div class="card shadow-sm tally-card-historial mb-5">
        <div
          class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3"
        >
          <h5 class="mb-0 fw-bold">
            <i class="bi bi-clock-history me-2"></i>Historial de Cotizaciones
          </h5>
          <button
            class="btn btn-sm btn-outline-light"
            onclick="nsHistorialCotizaciones.cargarCotizaciones()"
          >
            <i class="bi bi-arrow-clockwise"></i> Actualizar
          </button>
        </div>

        <div class="card-body p-3 text-dark">
          <div class="row g-2 mb-3">
            <div class="col-12 col-md-4">
              <div class="input-group input-group-sm">
                <span class="input-group-text"
                  ><i class="bi bi-search"></i
                ></span>
                <input
                  type="text"
                  id="buscarGeneral"
                  class="form-control"
                  placeholder="Buscar por nombre o celular..."
                  oninput="nsHistorialCotizaciones.ejecutarBusquedaConRetraso()"
                />
              </div>
            </div>
            <div class="col-12 col-md-4">
              <div class="input-group input-group-sm">
                <span class="input-group-text">Fecha</span>
                <input
                  type="date"
                  id="buscarFecha"
                  class="form-control"
                  onchange="nsHistorialCotizaciones.dispararFiltro()"
                />
              </div>
            </div>
            <div class="col-12 col-md-4 text-md-end">
              <button
                class="btn btn-sm btn-secondary"
                onclick="nsHistorialCotizaciones.limpiarFiltros()"
              >
                <i class="bi bi-eraser-fill"></i> Limpiar Filtros
              </button>
            </div>
          </div>

          <div class="table-responsive rounded-2 border">
            <table
              class="table table-hover align-middle mb-0"
              id="tablaHistorial"
            >
              <thead class="table-light">
                <tr>
                  <th class="ps-3">Consecutivo</th>
                  <th>Cliente</th>
                  <th>Fecha</th>
                  <th class="text-end">Total</th>
                  <th class="text-center">Acciones</th>
                </tr>
              </thead>
              <tbody id="tbodyHistorial">
                <tr>
                  <td colspan="5" class="text-center text-muted py-4">
                    Esperando datos...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="d-flex justify-content-between align-items-center mt-3">
            <div class="text-muted small" id="infoPaginacion">
              Mostrando 0 de 0 registros
            </div>
            <nav>
              <ul class="pagination pagination-sm mb-0" id="ulPaginacion"></ul>
            </nav>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  var nsHistorialCotizaciones = (function () {
    let paginaActual = 1;
    const limite = 10;
    let timeoutBusqueda = null; // Para evitar saturar el servidor al escribir (Debounce)

    async function cargarCotizaciones() {
      const tbody = document.getElementById("tbodyHistorial");
      const queryGeneral = document
        .getElementById("buscarGeneral")
        .value.trim();
      const queryFecha = document.getElementById("buscarFecha").value;

      try {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();
        if (!session) throw new Error("Debe iniciar sesión");

        // Construcción dinámica de la URL con los filtros actuales
        const urlParams = new URLSearchParams({
          pagina: paginaActual,
          limite: limite,
          busqueda: queryGeneral,
          fecha: queryFecha,
        });

        tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4"><span class="spinner-border spinner-border-sm me-2"></span>Consultando base de datos...</td></tr>`;

        const response = await fetch(
          `${SUPABASE_URL}/functions/v1/tally_obtenerCotizaciones?${urlParams.toString()}`,
          {
            method: "GET",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${session.access_token}`,
            },
          },
        );

        const result = await response.json();
        if (!result.ok) throw new Error(result.error);

        renderizarTabla(
          result.data,
          result.totalRegistros,
          result.paginasTotales,
        );
      } catch (err) {
        console.error(err);
        tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger py-4">Error: ${err.message}</td></tr>`;
      }
    }

    function renderizarTabla(cotizaciones, totalRegistros, paginasTotales) {
      const tbody = document.getElementById("tbodyHistorial");
      const infoPaginacion = document.getElementById("infoPaginacion");
      const ulPaginacion = document.getElementById("ulPaginacion");

      if (!cotizaciones || cotizaciones.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4">No se encontraron registros.</td></tr>`;
        infoPaginacion.innerText = "Mostrando 0 de 0 registros";
        ulPaginacion.innerHTML = "";
        return;
      }

      // Pintar registros devueltos por el servidor
      tbody.innerHTML = "";
      cotizaciones.forEach((cot) => {
        const fechaFormateada = new Date(cot.created_at).toLocaleDateString(
          "es-CO",
        );
        const urlSeguraPdf = `${SUPABASE_URL}/functions/v1/tally_getPdf?id=${cot.id}`;

        tbody.innerHTML += `
          <tr>
            <td class="ps-3 fw-bold text-primary">${cot.numero_cotizacion}</td>
            <td class="fw-medium">${cot.cliente_nombre}</td>
            <td>${fechaFormateada}</td>
            <td class="text-end fw-bold">$ ${cot.total_cotizacion.toLocaleString("es-CO")}</td>
            <td class="text-center">
              <a class="btn btn-sm btn-outline-danger me-1" href="${urlSeguraPdf}" target="_blank">
                <i class="bi bi-file-pdf"></i> PDF
              </a>
              <button class="btn btn-sm btn-whatsapp" onclick="nsHistorialCotizaciones.compartirWhatsApp('${cot.cliente_nombre}', '${cot.numero_cotizacion}', '${urlSeguraPdf}')">
                <i class="bi bi-whatsapp"></i> Compartir
              </button>
            </td>
          </tr>
        `;
      });

      // Calcular rangos visuales informativos
      const desdeRegistro = (paginaActual - 1) * limite + 1;
      const hastaRegistro = Math.min(
        desdeRegistro + cotizaciones.length - 1,
        totalRegistros,
      );
      infoPaginacion.innerText = `Mostrando del ${desdeRegistro} al ${hastaRegistro} de ${totalRegistros} registros`;

      // Armar controles de paginación fija de base de datos
      ulPaginacion.innerHTML = `
        <li class="page-item ${paginaActual === 1 ? "disabled" : ""}">
          <a class="page-link" href="#" onclick="nsHistorialCotizaciones.cambiarPagina(${paginaActual - 1}); return false;">Anterior</a>
        </li>
      `;

      for (let i = 1; i <= paginasTotales; i++) {
        ulPaginacion.innerHTML += `
          <li class="page-item ${paginaActual === i ? "active" : ""}">
            <a class="page-link" href="#" onclick="nsHistorialCotizaciones.cambiarPagina(${i}); return false;">${i}</a>
          </li>
        `;
      }

      ulPaginacion.innerHTML += `
        <li class="page-item ${paginaActual === paginasTotales ? "disabled" : ""}">
          <a class="page-link" href="#" onclick="nsHistorialCotizaciones.cambiarPagina(${paginaActual + 1}); return false;">Siguiente</a>
        </li>
      `;
    }

    // Evita lanzar peticiones por cada letra que presione el usuario (Espera 400ms a que termine de escribir)
    function ejecutarBusquedaConRetraso() {
      clearTimeout(timeoutBusqueda);
      timeoutBusqueda = setTimeout(() => {
        dispararFiltro();
      }, 400);
    }

    function dispararFiltro() {
      paginaActual = 1; // Al filtrar siempre volvemos a la página 1
      cargarCotizaciones();
    }

    function cambiarPagina(nuevaPagina) {
      paginaActual = nuevaPagina;
      cargarCotizaciones();
    }

    function limpiarFiltros() {
      document.getElementById("buscarGeneral").value = "";
      document.getElementById("buscarFecha").value = "";
      dispararFiltro();
    }

    function compartirWhatsApp(clienteNombre, numeroCotizacion, urlSeguraPdf) {
      const textoMsg = `Hola *${clienteNombre}*, adjuntamos el enlace con tu documento *${numeroCotizacion}*. Puedes visualizarlo aquí: ${urlSeguraPdf}`;
      const urlWhatsApp = `https://api.whatsapp.com/send?text=${encodeURIComponent(textoMsg)}`;
      window.open(urlWhatsApp, "_blank");
    }

    return {
      cargarCotizaciones,
      ejecutarBusquedaConRetraso,
      dispararFiltro,
      cambiarPagina,
      limpiarFiltros,
      compartirWhatsApp,
    };
  })();

  document.addEventListener("DOMContentLoaded", () => {
    nsHistorialCotizaciones.cargarCotizaciones();
  });
</script>
