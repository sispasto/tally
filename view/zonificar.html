    function optimizarTextoDireccion(textoOriginal) {
      let direccionOriginal = textoOriginal.toUpperCase().trim();
      let direccionFiltrada = direccionOriginal;

      if (direccionOriginal.includes("TAMASAGRA")) {
        return "BARRIO TAMASAGRA, Pasto, Nariño, Colombia";
      }

      const tieneMzOCasa =
        direccionOriginal.includes("MZ") ||
        direccionOriginal.includes("MANZANA") ||
        direccionOriginal.includes("CASA");

      let barrioDetectado = BARRIOS_PASTO.find((barrio) =>
        direccionOriginal.includes(barrio),
      );

      if (tieneMzOCasa && barrioDetectado) {
        if (
          (barrioDetectado === "CHAMBU" || barrioDetectado === "CHAMBÚ") &&
          direccionOriginal.includes("CAI")
        ) {
          direccionFiltrada = "CAI BARRIO CHAMBU";
        } else {
          direccionFiltrada = `BARRIO ${barrioDetectado}`;
        }
      } else {
        const regexNomenclatura =
          /^(?:CALLE|CLL|CRA|CARRERA|AV|AVENIDA|TRANSVERSAL|DIAGONAL|DG|TV)\s*\d+[A-Z]?\s*[A-Z]?\s*#\s*\d+[A-Z]?\s*-\s*\d+/i;
        const match = direccionOriginal.match(regexNomenclatura);

        if (match) {
          direccionFiltrada = match[0];
        }
      }

      return `${direccionFiltrada}, Pasto, Nariño, Colombia`;
    }

    async function buscarCoordenadas(direccionTexto) {
      const direccionFinal = optimizarTextoDireccion(direccionTexto);
      const url = `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(direccionFinal)}&components=locality:Pasto|country:CO&key=${GOOGLE_API_KEY}&language=es`;

      try {
        const respuesta = await fetch(url);
        const datos = await respuesta.json();
        if (datos.status === "OK" && datos.results.length > 0) {
          return {
            lat: datos.results[0].geometry.location.lat,
            lng: datos.results[0].geometry.location.lng,
          };
        }
      } catch (error) {
        console.error("Error consultando API de Google Geocoding:", error);
      }
      return null;
    }

        } = await supabaseClient.auth.getSession();
        if (!session) throw new Error("Sesión corporativa inválida");

        // Consumimos tu Edge Function recién creada
        const response = await fetch(
          `${SUPABASE_URL}/functions/v1/novaenvios_zonificar`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${session.access_token}`,
            },
            body: JSON.stringify({ lat: lat, lng: lng }),
          },
        );

        const resultado = await response.json();
        if (!response.ok)
          throw new Error(resultado.error || "Error en Edge Function");

        return {
          encontrado: resultado.encontrado,
          codigo_ruta: resultado.codigo_ruta,
          nombre_ruta: resultado.nombre_ruta,
        };
      } catch (err) {
        console.error("Fallo al zonificar vía Edge Function:", err);
        return {
          encontrado: false,
          codigo_ruta: null,
          nombre_ruta: "Error de Servidor",
        };
      }
    }

    const inputGuia = document.getElementById("inputGuia");
    inputGuia.addEventListener("keydown", async function (e) {
      if (e.key === "Enter" || e.key === "Tab") {
        e.preventDefault();
        const numeroGuia = this.value.replace(/[^0-9]/g, "");
        if (!numeroGuia) return;

        const existe = listaGuias.some((g) => g.guia === numeroGuia);
        if (existe) {
          alertSMS(`Guía ${numeroGuia} ya está en la lista`);
          this.value = "";
          return;
        }

        try {
          this.disabled = true;
          this.placeholder = "ZONIFICANDO GUÍA EN TIEMPO REAL...";

          // 1. Obtener la guía desde el backend local
          const responseGuia = await fetch(
            `http://localhost:8081/guia/${numeroGuia}`,
          );
          const dataGuia = await responseGuia.json();

          if (!dataGuia.ok) {
            throw new Error(
              `La guía ${numeroGuia} no existe en el sistema local.`,
            );
          }

          const direccionOriginal = dataGuia.direccion;

          // 2. Obtener Coordenadas de Google Maps
          const coords = await buscarCoordenadas(direccionOriginal);

          let infoZona = {
            encontrado: false,
            codigo_ruta: null,
            nombre_ruta: "Fuera de zona / No asignado",
          };

          // 3. Si Google devolvió coordenadas, consultamos de inmediato a Supabase mediante la Edge Function
          if (coords) {
            infoZona = await obtenerZonificacionPostGIS(coords.lat, coords.lng);
          }

          // 4. Agregamos el set de datos completo a la lista temporal
          listaGuias.push({
            guia: numeroGuia,
            direccion: direccionOriginal,
            latitud: coords ? coords.lat : "No encontrado",
            longitud: coords ? coords.lng : "No encontrado",
            codigo_ruta: infoZona.codigo_ruta,
            nombre_ruta: infoZona.nombre_ruta,
          });

          renderGuias();

          const container = document.querySelector(".table-responsive");
          container.scrollTop = container.scrollHeight;
        } catch (err) {
          console.error("Error procesando guía:", err);
          alertSMS(`Error: ${err.message}`);
        } finally {
          this.disabled = false;
          this.value = "";
          this.placeholder = "ESCANEAR GUÍA AQUÍ";
          this.focus();
        }
      }
    });

    // Modificado para soportar estéticamente el badge de la Ruta asignada por PostGIS
    function renderGuias() {
      const tbody = document.getElementById("tablaGuias");
      tbody.innerHTML = listaGuias
        .map(
          (g, i) => `
      <tr>
        <td class="text-center text-muted small">${i + 1}</td>
        <td><span class="fw-bold text-nova">${g.guia}</span></td>
        <td><small class="text-uppercase">${g.direccion}</small></td>
        <td><span class="text-coords">${g.latitud}</span></td>
        <td><span class="text-coords">${g.longitud}</span></td>
        <td>
          <span class="badge ${g.codigo_ruta ? "bg-success" : "bg-secondary"} w-100 py-2">
            <i class="fas fa-route me-1"></i> ${g.nombre_ruta}
          </span>
        </td>
        <td class="text-center">
          <button type="button" class="btn-remove-guia" onclick="zonificar.quitarGuia(${i})" title="Quitar">
            <i class="fas fa-times"></i>
          </button>
        </td>
      </tr>`,
        )
        .join("");

      document.getElementById("contadorGuias").innerText = listaGuias.length;
    }

    async function guardarEnSupabase(guiasParaGrabar) {
      try {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();
        if (!session) throw new Error("Inicie sesión nuevamente.");

        // Insertamos directamente el array masivo en tu tabla de registros históricos de guías
        const { data, error } = await supabaseClient
          .from("log_guias_procesadas") // Asegúrate de que coincida con el nombre exacto de tu tabla destino
          .insert(guiasParaGrabar);

        if (error) throw error;
        return true;
      } catch (err) {
        console.error("Error persistiendo datos en Supabase:", err);
        throw new Error(`Error de persistencia: ${err.message}`);
      }
    }

    async function procesarRegistro() {
      const btnGuardar = document.getElementById("btnGuardar");

      try {
        if (listaGuias.length === 0)
          throw new Error("No hay guías escaneadas para registrar.");

        btnGuardar.disabled = true;
        btnGuardar.innerHTML =
          '<i class="fas fa-spinner fa-spin me-2"></i>GUARDANDO EN BASE DE DATOS...';

        // Mapeamos el payload inyectando el código de ruta exacto que calculó PostGIS
        const payload = listaGuias.map((g) => ({
          numero_guia: g.guia,
          direccion: g.direccion,
          latitud: typeof g.latitud === "number" ? g.latitud : null,
          longitud: typeof g.longitud === "number" ? g.longitud : null,
          codigo_ruta: g.codigo_ruta, // Guardamos el ID numérico (1, 2, 3...) asignado automáticamente
          registrado_el: new Date().toISOString(),
        }));

        await guardarEnSupabase(payload);

        alertSMS(
          `¡Éxito! ${listaGuias.length} guías guardadas, zonificadas y despachadas de forma perfecta. ✅`,
        );

        listaGuias = [];
        renderGuias();
      } catch (err) {
        console.error("Error al guardar:", err);
        alertSMS(err.message);
      } finally {
        btnGuardar.disabled = false;
        btnGuardar.innerHTML =
          '<i class="fas fa-cloud-upload-alt me-2"></i>REGISTRAR COORDENADAS EN BASE DE DATOS';
      }
    }

    return {
      procesarRegistro,
      limpiarGuias: () => {
        listaGuias = [];
        renderGuias();
      },
      quitarGuia: (i) => {
        listaGuias.splice(i, 1);
        renderGuias();
      },
    };
  })();
</script>
