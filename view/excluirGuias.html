<style>
  /* --- AJUSTES GENERALES --- */
  .scan-input {
    border: 2px solid #dc3545 !important; /* Rojo para indicar "Eliminación" */
    font-weight: bold;
  }

  /* --- RESPONSIVE: PC --- */
  @media (min-width: 992px) {
    /* Aplicamos el padding solo al div #App, NO a todos los container-fluid */
    main#App .container-fluid {
      padding: 30px 60px;
    }

    .table-responsive {
      max-height: 400px;
    }
  }

  /* --- RESPONSIVE: MÓVIL Y TABLET --- */
  @media (max-width: 768px) {
    /* El encabezado (Fecha/Resp) se apila */
    .col-md-3,
    .col-md-6 {
      margin-bottom: 10px;
    }

    /* Input de escaneo más grande para dedos */
    .form-control-lg {
      font-size: 18px !important;
    }

    /* Botón de confirmar siempre visible y grande */
    .btn-dark.w-100 {
      padding: 15px;
      font-size: 16px;
      margin-top: 15px;
    }

    /* Tabla compacta */
    .table-sm td {
      padding: 12px 8px !important;
      font-size: 14px;
    }
  }

  /* MODO HORIZONTAL (LANDSCAPE) - IMPORTANTE PARA ESCANEO */
  @media (orientation: landscape) and (max-height: 500px) {
    .card-header {
      display: none;
    } /* Ganamos espacio vertical */
    .table-responsive {
      max-height: 150px;
    }
    .container-fluid {
      margin-top: 0 !important;
    }
  }
</style>
<div class="container-fluid mt-3">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-10 col-xl-8">
      <div class="card shadow border-0">
        <div class="card-header bg-dark text-white py-3">
          <h5 class="mb-0 fw-bold">Sacar Guías de Planilla</h5>
        </div>

        <div class="card-body">
          <div class="row g-3 mb-3">
            <div class="col-12 col-md-6">
              <label class="form-label fw-bold small text-muted text-uppercase"
                >1. Número de Planilla</label
              >
              <div class="input-group shadow-sm">
                <input
                  type="number"
                  class="form-control"
                  id="num_planilla_sacar"
                  placeholder="Ingrese planilla"
                />
                <button
                  class="btn btn-dark px-4"
                  type="button"
                  onclick="nsSacarGuias.validarPlanilla()"
                >
                  Validar
                </button>
              </div>
            </div>

            <div class="col-6 col-md-3">
              <label class="form-label small text-muted fw-bold"
                >Fecha Creación</label
              >
              <input
                type="text"
                class="form-control bg-light"
                id="fecha_sacar"
                readonly
              />
            </div>

            <div class="col-6 col-md-3">
              <label class="form-label small text-muted fw-bold"
                >Responsable</label
              >
              <input
                type="text"
                class="form-control bg-light"
                id="resp_sacar"
                readonly
              />
            </div>
          </div>

          <hr class="opacity-25" />

          <div id="seccionEscaneo" style="display: none">
            <div class="mb-2">
              <strong class="text-danger"
                ><i class="fas fa-barcode"></i> 2. Escanear guías para
                eliminar</strong
              >
            </div>

            <div class="input-group mb-3 shadow-sm">
              <span class="input-group-text bg-danger text-white border-danger">
                <i class="fas fa-search"></i>
              </span>
              <input
                type="text"
                class="form-control form-control-lg scan-input"
                id="input_scan_sacar"
                placeholder="Pistolee la guía aquí..."
                autofocus
              />
            </div>

            <div class="table-responsive border rounded mb-3">
              <table class="table table-sm table-hover mb-0">
                <thead class="table-danger">
                  <tr>
                    <th class="ps-3">Guía a Eliminar</th>
                    <th width="80" class="text-center">Quitar</th>
                  </tr>
                </thead>
                <tbody id="tablaSacar"></tbody>
              </table>
            </div>

            <button
              class="btn btn-dark w-100 fw-bold shadow"
              onclick="nsSacarGuias.procesarEliminacion()"
            >
              CONFIRMAR Y ELIMINAR GUIAS
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  var nsSacarGuias = (function () {
    let guiasParaEliminar = [];
    let guiasOriginales = [];

    // Listener para el input de escaneo
    document
      .getElementById("input_scan_sacar")
      .addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          const guia = e.target.value.trim();
          if (guia) agregarALista(guia);
          e.target.value = "";
        }
      });

    async function validarPlanilla() {
      try {
        const num = document.getElementById("num_planilla_sacar").value;
        if (!num) throw new Error("Ingrese número de planilla");

        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        // Reutilizamos tu lógica de validación
        const response = await fetch(
          `${SUPABASE_URL}/functions/v1/novaenvios_validar_planilla`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${session.access_token}`,
            },
            body: JSON.stringify({ num_planilla: parseInt(num) }),
          },
        );

        const result = await response.json();
        if (!result.ok) throw new Error(result.error);

        const planilla = result.data;

        // Solo lanzamos error si NO está abierta Y ADEMÁS NO es devolución
        if (planilla.estado !== "AB") {
          throw new Error(
            `No se puede procesar: La planilla está ${planilla.estado}. Solo se permiten planillas ABIERTAS.`,
          );
        }

        // Llenar encabezado
        document.getElementById("fecha_sacar").value = new Date(
          planilla.fecha_planilla,
        ).toLocaleDateString();
        document.getElementById("resp_sacar").value =
          planilla.nombre_responsable;

        // Guardar guías que pertenecen a la planilla para validar que no pistoleen guías de otros
        guiasOriginales = planilla.guias;

        // Mostrar sección de escaneo
        document.getElementById("seccionEscaneo").style.display = "block";
        document.getElementById("input_scan_sacar").focus();
      } catch (err) {
        alertSMS(err.message);
      }
    }

    function agregarALista(guia) {
      console.log("Intentando agregar guía:", guiasOriginales);
      // Validar que la guía pertenezca a la planilla
      // ANTES (Cuando era un array de strings):

      // AHORA (Como es un array de objetos):
      if (!guiasOriginales.some((item) => item.guia === guia)) {
        alertSMS(`La guía ${guia} no pertenece a esta planilla.`);
        return;
      }

      if (guiasParaEliminar.includes(guia)) {
        alertSMS("La guía ya está en la lista para eliminar");
        return;
      }

      guiasParaEliminar.push(guia);
      renderTabla();
    }

    function quitarDeLista(index) {
      guiasParaEliminar.splice(index, 1);
      renderTabla();
    }

    function renderTabla() {
      const tbody = document.getElementById("tablaSacar");
      tbody.innerHTML = "";
      guiasParaEliminar.forEach((g, i) => {
        tbody.innerHTML += `
                <tr>
                    <td class="fw-bold">${g}</td>
                    <td><button class="btn btn-sm btn-outline-danger" onclick="nsSacarGuias.quitarDeLista(${i})">×</button></td>
                </tr>`;
      });
    }

    async function procesarEliminacion() {
      try {
        console.log("Guías para eliminar:", guiasParaEliminar);
        if (guiasParaEliminar.length === 0)
          throw new Error("No hay guías para eliminar");

        const num = document.getElementById("num_planilla_sacar").value;
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        // Llamamos a una nueva Edge Function que crearemos abajo
        const response = await fetch(
          `${SUPABASE_URL}/functions/v1/novaenvios_excluir_guias`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${session.access_token}`,
            },
            // CAMBIO AQUÍ: Enviamos el array directamente, no envuelto en un objeto {}
            body: JSON.stringify(guiasParaEliminar),
          },
        );

        const result = await response.json();
        if (!response.ok) throw new Error(result.error);

        alertSMS("Guías eliminadas de la planilla correctamente");

        // Resetear todo
        guiasParaEliminar = [];
        document.getElementById("seccionEscaneo").style.display = "none";
        document.getElementById("num_planilla_sacar").value = "";
        document.getElementById("fecha_sacar").value = "";
        document.getElementById("resp_sacar").value = "";
      } catch (err) {
        alertSMS(err.message);
      }
    }

    return {
      validarPlanilla,
      quitarDeLista,
      procesarEliminacion,
    };
  })();
</script>
