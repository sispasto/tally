<!doctype html>
<html lang="es-CO">
  <head>
    <title>Tally</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <!-- Bootstrap Icons 1 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/loader.css" />
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />

    <!-- Bootstrap JS bundle (incluye Popper) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <!--Supabase-->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Tu JS -->
    <script type="module" src="componentes/index.js"></script>
    <link rel="manifest" href="manifest.json" />
  </head>

  <body>
    <section id="header">
      <nav class="navbar navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
          <a class="navbar-brand" id="textUser" href="#"></a
          ><!--Aqui va el nombre del usuario logueado-->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#offcanvasDarkNavbar"
            aria-controls="offcanvasDarkNavbar"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div
            class="offcanvas offcanvas-start text-bg-dark"
            tabindex="-1"
            id="offcanvasDarkNavbar"
            aria-labelledby="offcanvasDarkNavbarLabel"
          >
            <div class="offcanvas-header">
              <h5 class="offcanvas-title" id="offcanvasDarkNavbarLabel"></h5>
              <button
                type="button"
                class="btn-close btn-close-white"
                data-bs-dismiss="offcanvas"
                aria-label="Close"
              ></button>
            </div>
            <div class="offcanvas-body"></div>
            <!-- Aquí se inyectarán los menús según el rol -->
          </div>
        </div>
      </nav>
      <!-- Login Modal -->
      <div
        class="modal fade"
        id="loginModal"
        tabindex="-1"
        aria-labelledby="loginModalLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="loginModalLabel">Iniciar Sesión</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              <form id="loginForm">
                <div class="mb-3">
                  <label for="username" class="form-label">Usuario</label>
                  <input
                    type="text"
                    class="form-control"
                    id="username"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Contraseña</label>
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    required
                  />
                </div>
                <button
                  type="button"
                  class="btn btn-primary w-100"
                  onclick="authenticateUser()"
                >
                  Iniciar Sesión
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- Modal para cambiar contraseña -->
      <div
        class="modal fade"
        id="changePasswordModal"
        tabindex="-1"
        aria-labelledby="changePasswordModalLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="changePasswordModalLabel">
                Cambiar Contraseña
              </h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              <form id="changePasswordForm">
                <div class="mb-3">
                  <label for="newPassword" class="form-label"
                    >Nueva clave</label
                  >
                  <input
                    type="password"
                    class="form-control"
                    id="newPassword"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="confirmNewPassword" class="form-label"
                    >Confirmar clave</label
                  >
                  <input
                    type="password"
                    class="form-control"
                    id="confirmNewPassword"
                    required
                  />
                </div>
                <button
                  type="button"
                  class="btn btn-primary w-100"
                  onclick="updatePassword()"
                >
                  Actualizar Contraseña
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- Alert para mostrar resultado -->
      <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div
          id="liveToast"
          class="toast hide"
          role="alert"
          aria-live="assertive"
          aria-atomic="true"
        >
          <div class="toast-header bg-primary">
            <i class="bi bi-chat-left-text"></i>
            <strong class="me-auto"></strong>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="toast"
              aria-label="Close"
            ></button>
          </div>
          <div class="toast-body"></div>
        </div>
      </div>
    </section>

    <main class="container-fluid p-0 m-0 text-center mt-5 pt-3" id="App"></main>
    <script src="js/main.js"></script>

    <script>
      window.SUPABASE_URL = "https://duqmjkysssceibljimwz.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1cW1qa3lzc3NjZWlibGppbXd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3ODA4MDUsImV4cCI6MjA5OTM1NjgwNX0.Ezu18vkPHAPzs0udTX6PLXVRI7NXMU2z7D03TbqvKtM";
      window.supabaseClient = supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );
      /********************************************************************************/
      // Inicializar sesión
      sessionStorage.setItem("nombreUsuario", "");
      document.getElementById("textUser").textContent =
        sessionStorage.getItem("nombreUsuario");
      /*******************************************************************************/

      async function verificarSesion() {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        if (!session) {
          PpalMenu.mostrarMenuInvitado();
          return;
        }

        try {
          const response = await fetch(
            `${SUPABASE_URL}/functions/v1/novaenvios_authUser`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${session.access_token}`,
              },
              body: JSON.stringify({ action: "login" }),
            },
          );

          const data = await response.json();

          if (data.status === "success") {
            const { nombre, rol, persona_id } = data;

            sessionStorage.setItem("nombreUsuario", nombre);
            sessionStorage.setItem("userRol", rol);
            sessionStorage.setItem("personaId", persona_id || "");

            PpalMenu.mostrarMenuPorRol(rol, nombre);
          }
        } catch (error) {
          console.error("Error verificando sesión:", error);
        }
      }

      function safeHideModal(modalId) {
        const modalElement = document.getElementById(modalId);
        if (!modalElement) return;

        // 1. Quitamos el foco del elemento actual (como el botón 'X')
        if (document.activeElement) {
          document.activeElement.blur();
        }

        // 2. Obtenemos la instancia y la ocultamos
        const modal = bootstrap.Modal.getInstance(modalElement);
        if (modal) {
          modal.hide();
        }
      }

      /******************************************************************************/

      function showLoginModal() {
        cerrarModalesActivos();
        new bootstrap.Modal(document.getElementById("loginModal")).show();
      }

      function showChangePasswordModal() {
        cerrarModalesActivos();
        new bootstrap.Modal(
          document.getElementById("changePasswordModal"),
        ).show();
      }

      // ============================
      // LOGIN
      // ============================
      async function authenticateUser() {
        const usuario = document.getElementById("username").value.trim();
        const clave = document.getElementById("password").value.trim();

        if (!usuario || !clave) {
          alertSMS("Usuario y clave requeridos");
          return;
        }

        try {
          // 1. Autenticación básica
          const { data: authData, error: authError } =
            await supabaseClient.auth.signInWithPassword({
              email: `${usuario}@tally.com`,
              password: clave,
            });

          if (authError) {
            alertSMS("Usuario o clave incorrectos");
            return;
          }

          // 2. Obtener perfil detallado desde Edge Function
          const response = await fetch(
            `${SUPABASE_URL}/functions/v1/tally_authUser`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${authData.session.access_token}`,
              },
              body: JSON.stringify({ action: "login" }),
            },
          );

          const data = await response.json();

          if (data.status === "success") {
            const { nombre, rol, persona_id, empresa_id } = data;

            //Habilitar Menu
            PpalMenu.mostrarMenuPorRol(rol, nombre);

            // GUARDAR DATOS CLAVE PARA EL RESTO DE LA APP
            sessionStorage.setItem("nombreUsuario", nombre);
            sessionStorage.setItem("userRol", rol);
            sessionStorage.setItem("personaId", persona_id || ""); // Para registros de beneficios

            // Cerrar modal y redirigir
            safeHideModal("loginModal");

            getHome();
            alertSMS("Bienvenido " + nombre);
          }
        } catch (err) {
          console.error("Error en la conexión:", err);
          alertSMS("No se pudo completar el inicio de sesión");
        }
      }

      // ============================
      // ACTUALIZAR CONTRASEÑA
      // ============================
      async function updatePassword() {
        const claveNueva = document.getElementById("newPassword").value.trim();
        const confirmacionClave = document
          .getElementById("confirmNewPassword")
          .value.trim();

        // 1. Validaciones básicas de cliente
        if (claveNueva !== confirmacionClave) {
          alertSMS("Las claves no coinciden");
          return;
        }

        if (claveNueva.length < 6) {
          alertSMS("La clave debe tener al menos 6 caracteres");
          return;
        }

        try {
          // 2. Obtener la sesión actual para extraer el Token (JWT)
          const {
            data: { session },
          } = await supabaseClient.auth.getSession();

          if (!session) {
            alertSMS("Sesión expirada. Por favor, inicia sesión de nuevo.");
            return;
          }

          // 3. Llamada a la Edge Function
          // Dentro de tu función updatePassword() en el HTML:
          const response = await fetch(
            `${SUPABASE_URL}/functions/v1/novaenvios_authUser`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${session.access_token}`,
              },
              body: JSON.stringify({
                action: "updatePassword", // Coincide con el if en la Edge Function
                claveNueva: claveNueva, // Coincide con la variable en la Edge Function
              }),
            },
          );

          const data = await response.json();

          if (data.status === "success") {
            // 4. Limpiar y cerrar modales
            document.getElementById("newPassword").value = "";
            document.getElementById("confirmNewPassword").value = "";

            safeHideModal("changePasswordModal");

            const navEl = document.getElementById("navbarText");
            const bsCollapse =
              bootstrap.Collapse.getInstance(navEl) ||
              new bootstrap.Collapse(navEl, { toggle: false });
            bsCollapse.hide();

            alertSMS("Clave actualizada exitosamente");
          } else {
            alertSMS(data.mensaje || "No se pudo actualizar la clave");
          }
        } catch (err) {
          console.error("Error en updatePassword:", err);
          alertSMS("Error en la conexión al servidor");
        }
      }
      // ============================
      // CERRAR SESIÓN
      // ============================
      async function logout() {
        try {
          // 1. Cerrar sesión en el servidor de Supabase (Invalida el JWT )
          const { error } = await supabaseClient.auth.signOut();
          if (error)
            console.error("Error al cerrar sesión en Supabase:", error.message);

          // 2. Limpieza TOTAL del almacenamiento de sesión
          // Esto borra nombreUsuario, userRol, personaId y empresaId de un golpe
          // 2. Limpieza TOTAL
          sessionStorage.clear();

          // 3. Valores de seguridad para que la App no "explote" al leerlos
          sessionStorage.setItem("userRol", "0");
          sessionStorage.setItem("nombreUsuario", "");
          sessionStorage.setItem("personaId", "");

          PpalMenu.mostrarMenuInvitado();

          // 5. Limpiar campos físicos de los formularios de login/password
          const fields = [
            "username",
            "password",
            "newPassword",
            "confirmNewPassword",
          ];
          fields.forEach((id) => {
            const el = document.getElementById(id);
            if (el) el.value = "";
          });

          // 6. Colapsar el menú de Bootstrap si está abierto
          const navbarCollapse = document.getElementById("navbarText");
          if (navbarCollapse) {
            const bsCollapse = bootstrap.Collapse.getInstance(navbarCollapse);
            if (bsCollapse) bsCollapse.hide();
          }

          PpalMenu.mostrarMenuInvitado();

          // 7. Redirigir al Home y notificar
          if (typeof getHome === "function") getHome();
          alertSMS("Sesión cerrada correctamente");
        } catch (err) {
          console.error("Error crítico en logout:", err);
        }
      }

      // ============================
    </script>

    <script>
      window.addEventListener("load", async () => {
        // 🔹 Verificar sesión al cargar la página
        if (typeof verificarSesion === "function") {
          await verificarSesion();
        }

        // 🔹 Registrar Service Worker
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker
            .register("./service-worker.js")
            .then((reg) => console.log("Service Worker registrado", reg.scope))
            .catch((err) =>
              console.error("Error registrando Service Worker", err),
            );
        }
      });
    </script>
  </body>
</html>
