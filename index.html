<!doctype html>
<html lang="es-CO">
  <head>
    <title>TALLY</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <!-- Bootstrap Icons 1 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/loader.css" />
    <link rel="icon" href="/tally/assets/favicon.ico" type="image/x-icon" />

    <!-- Bootstrap JS bundle (incluye Popper) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <!--Supabase-->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Tu JS -->
    <script type="module" src="componentes/index.js"></script>
    <link rel="manifest" href="manifest.json" />

    <!-- Paleta de colores estilo Treinta inyectada directamente -->
    <style>
      :root {
        --treinta-yellow: #fbc02d; /* El amarillo vibrante característico */
        --treinta-bg: #f8f9fa; /* Fondo gris claro muy limpio */
      }
      body {
        background-color: var(--treinta-bg);
      }
      /* Forzamos que la navbar tenga el fondo amarillo y texto oscuro */
      .navbar-treinta {
        background-color: var(--treinta-yellow) !important;
      }
      .navbar-treinta .navbar-brand {
        color: #000000 !important;
        font-weight: 700;
      }
      /* Estilo del botón de hamburguesa para fondo amarillo */
      .navbar-treinta .navbar-toggler {
        border-color: rgba(0, 0, 0, 0.1) !important;
      }
      .navbar-treinta .navbar-toggler-icon {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%280, 0, 0, 0.7%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e") !important;
      }
      /* Sidebar (Offcanvas) en blanco limpio con header amarillo */
      .offcanvas-treinta {
        background-color: #ffffff !important;
        color: #333333 !important;
        border-right: none !important;
      }
      .offcanvas-treinta .offcanvas-header {
        background-color: var(--treinta-yellow);
        color: #000000;
      }
    </style>
  </head>

  <body>
    <section id="header">
      <!-- Cambiado de navbar-dark bg-dark a nuestra clase personalizada navbar-treinta -->
      <nav class="navbar navbar-treinta fixed-top shadow-sm">
        <div class="container-fluid">
          <a
            class="navbar-brand text-uppercase d-flex align-items-center"
            id="textUser"
            href="#"
          >
            <i class="bi bi-person-circle me-2"></i> TALLY
          </a>
          <!-- Cambiado el botón para interactuar correctamente con el nuevo estilo claro -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#offcanvasDarkNavbar"
            aria-controls="offcanvasDarkNavbar"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <!-- Cambiado de text-bg-dark a offcanvas-treinta para volver el menú lateral limpio y claro -->
          <div
            class="offcanvas offcanvas-start offcanvas-treinta"
            tabindex="-1"
            id="offcanvasDarkNavbar"
            aria-labelledby="offcanvasDarkNavbarLabel"
          >
            <div class="offcanvas-header shadow-sm">
              <h5 class="offcanvas-title fw-bold" id="offcanvasDarkNavbarLabel">
                Menú Principal
              </h5>
              <!-- Cambiado a btn-close normal (oscuro) para fondo claro -->
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="offcanvas"
                aria-label="Close"
              ></button>
            </div>
            <div class="offcanvas-body">
              <!-- Aquí se inyectarán los menús según el rol -->
            </div>
          </div>
        </div>
      </nav>

      <!-- Login Modal -->
      <div
        class="modal fade"
        id="loginModal"
        tabindex="-1"
        aria-labelledby="loginModalLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog">
          <div class="modal-content">
            <div
              class="modal-header"
              style="background-color: var(--treinta-yellow)"
            >
              <h5 class="modal-title fw-bold text-dark" id="loginModalLabel">
                Iniciar Sesión
              </h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              <form id="loginForm">
                <div class="mb-3">
                  <label for="username" class="form-label fw-semibold"
                    >Usuario</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="username"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label fw-semibold"
                    >Contraseña</label
                  >
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    required
                  />
                </div>
                <!-- Botón adaptado a color amarillo de acción -->
                <button
                  type="button"
                  class="btn btn-warning w-100 fw-bold shadow-sm"
                  style="background-color: var(--treinta-yellow); border: none"
                  onclick="authenticateUser()"
                >
                  Iniciar Sesión
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- Modal para cambiar contraseña -->
      <div
        class="modal fade"
        id="changePasswordModal"
        tabindex="-1"
        aria-labelledby="changePasswordModalLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog">
          <div class="modal-content">
            <div
              class="modal-header"
              style="background-color: var(--treinta-yellow)"
            >
              <h5
                class="modal-title fw-bold text-dark"
                id="changePasswordModalLabel"
              >
                Cambiar Contraseña
              </h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              <form id="changePasswordForm">
                <div class="mb-3">
                  <label for="newPassword" class="form-label fw-semibold"
                    >Nueva clave</label
                  >
                  <input
                    type="password"
                    class="form-control"
                    id="newPassword"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="confirmNewPassword" class="form-label fw-semibold"
                    >Confirmar clave</label
                  >
                  <input
                    type="password"
                    class="form-control"
                    id="confirmNewPassword"
                    required
                  />
                </div>
                <button
                  type="button"
                  class="btn btn-warning w-100 fw-bold shadow-sm"
                  style="background-color: var(--treinta-yellow); border: none"
                  onclick="updatePassword()"
                >
                  Actualizar Contraseña
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- Alert para mostrar resultado -->
      <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div
          id="liveToast"
          class="toast hide"
          role="alert"
          aria-live="assertive"
          aria-atomic="true"
        >
          <div
            class="toast-header text-dark"
            style="background-color: var(--treinta-yellow)"
          >
            <i class="bi bi-chat-left-text me-2"></i>
            <strong class="me-auto">Notificación</strong>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="toast"
              aria-label="Close"
            ></button>
          </div>
          <div class="toast-body"></div>
        </div>
      </div>
    </section>

    <main class="container-fluid p-0 m-0 text-center mt-5 pt-4" id="App"></main>
    <script src="js/main.js"></script>

    <script>
      window.SUPABASE_URL = "https://ucmpldcbsccfozuxodig.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjbXBsZGNic2NjZm96dXhvZGlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5ODY3NTEsImV4cCI6MjA4ODU2Mjc1MX0.iOXoihyzqEJQgbUV0Ms_f1Inj7H_HmT7Uoh4TErl0b0";
      window.supabaseClient = supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );
      /********************************************************************************/
      // Inicializar sesión
      sessionStorage.setItem("nombreUsuario", "");
      document.getElementById("textUser").textContent =
        sessionStorage.getItem("nombreUsuario");
      /*******************************************************************************/

      async function verificarSesion() {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        if (!session) {
          NovaMenu.mostrarMenuInvitado();
          return;
        }

        try {
          const response = await fetch(
            `${SUPABASE_URL}/functions/v1/novaenvios_authUser`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${session.access_token}`,
              },
              body: JSON.stringify({ action: "login" }),
            },
          );

          const data = await response.json();

          if (data.status === "success") {
            const { nombre, rol, persona_id } = data;

            sessionStorage.setItem("nombreUsuario", nombre);
            sessionStorage.setItem("userRol", rol);
            sessionStorage.setItem("personaId", persona_id || "");

            // Se fuerza el texto superior a tener el nombre del negocio o usuario
            document.getElementById("textUser").innerHTML =
              `<i class="bi bi-person-circle me-2"></i> ${nombre || "TALLY"}`;

            NovaMenu.mostrarMenuPorRol(rol, nombre);
          }
        } catch (error) {
          console.error("Error verificando sesión:", error);
        }
      }

      function safeHideModal(modalId) {
        const modalElement = document.getElementById(modalId);
        if (!modalElement) return;

        if (document.activeElement) {
          document.activeElement.blur();
        }

        const modal = bootstrap.Modal.getInstance(modalElement);
        if (modal) {
          modal.hide();
        }
      }

      /******************************************************************************/

      function showLoginModal() {
        cerrarModalesActivos();
        new bootstrap.Modal(document.getElementById("loginModal")).show();
      }

      function showChangePasswordModal() {
        cerrarModalesActivos();
        new bootstrap.Modal(
          document.getElementById("changePasswordModal"),
        ).show();
      }

      async function authenticateUser() {
        const usuario = document.getElementById("username").value.trim();
        const clave = document.getElementById("password").value.trim();

        if (!usuario || !clave) {
          alertSMS("Usuario y clave requeridos");
          return;
        }

        try {
          const { data: authData, error: authError } =
            await supabaseClient.auth.signInWithPassword({
              email: `${usuario}@novaenvios.com`,
              password: clave,
            });

          if (authError) {
            alertSMS("Usuario o clave incorrectos");
            return;
          }

          const response = await fetch(
            `${SUPABASE_URL}/functions/v1/novaenvios_authUser`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${authData.session.access_token}`,
              },
              body: JSON.stringify({ action: "login" }),
            },
          );

          const data = await response.json();

          if (data.status === "success") {
            const { nombre, rol, persona_id, empresa_id } = data;

            NovaMenu.mostrarMenuPorRol(rol, nombre);

            sessionStorage.setItem("nombreUsuario", nombre);
            sessionStorage.setItem("userRol", rol);
            sessionStorage.setItem("personaId", persona_id || "");

            document.getElementById("textUser").innerHTML =
              `<i class="bi bi-person-circle me-2"></i> ${nombre}`;

            safeHideModal("loginModal");

            getHome();
            alertSMS("Bienvenido " + nombre);
          }
        } catch (err) {
          console.error("Error en la conexión:", err);
          alertSMS("No se pudo completar el inicio de sesión");
        }
      }

      async function updatePassword() {
        const claveNueva = document.getElementById("newPassword").value.trim();
        const confirmacionClave = document
          .getElementById("confirmNewPassword")
          .value.trim();

        if (claveNueva !== confirmacionClave) {
          alertSMS("Las claves no coinciden");
          return;
        }

        if (claveNueva.length < 6) {
          alertSMS("La clave debe tener al menos 6 caracteres");
          return;
        }

        try {
          const {
            data: { session },
          } = await supabaseClient.auth.getSession();

          if (!session) {
            alertSMS("Sesión expirada. Por favor, inicia sesión de nuevo.");
            return;
          }

          const response = await fetch(
            `${SUPABASE_URL}/functions/v1/novaenvios_authUser`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${session.access_token}`,
              },
              body: JSON.stringify({
                action: "updatePassword",
                claveNueva: claveNueva,
              }),
            },
          );

          const data = await response.json();

          if (data.status === "success") {
            document.getElementById("newPassword").value = "";
            document.getElementById("confirmNewPassword").value = "";

            safeHideModal("changePasswordModal");

            const navEl = document.getElementById("navbarText");
            const bsCollapse =
              bootstrap.Collapse.getInstance(navEl) ||
              new bootstrap.Collapse(navEl, { toggle: false });
            bsCollapse.hide();

            alertSMS("Clave actualizada exitosamente");
          } else {
            alertSMS(data.mensaje || "No se pudo actualizar la clave");
          }
        } catch (err) {
          console.error("Error en updatePassword:", err);
          alertSMS("Error en la conexión al servidor");
        }
      }

      async function logout() {
        try {
          const { error } = await supabaseClient.auth.signOut();
          if (error)
            console.error("Error al cerrar sesión en Supabase:", error.message);

          sessionStorage.clear();

          sessionStorage.setItem("userRol", "0");
          sessionStorage.setItem("nombreUsuario", "");
          sessionStorage.setItem("personaId", "");

          document.getElementById("textUser").innerHTML =
            `<i class="bi bi-person-circle me-2"></i> TALLY`;

          NovaMenu.mostrarMenuInvitado();

          const fields = [
            "username",
            "password",
            "newPassword",
            "confirmNewPassword",
          ];
          fields.forEach((id) => {
            const el = document.getElementById(id);
            if (el) el.value = "";
          });

          const navbarCollapse = document.getElementById("navbarText");
          if (navbarCollapse) {
            const bsCollapse = bootstrap.Collapse.getInstance(navbarCollapse);
            if (bsCollapse) bsCollapse.hide();
          }

          if (typeof getHome === "function") getHome();
          alertSMS("Sesión cerrada correctamente");
        } catch (err) {
          console.error("Error crítico en logout:", err);
        }
      }
    </script>

    <script>
      window.addEventListener("load", async () => {
        if (typeof verificarSesion === "function") {
          await verificarSesion();
        }

        if ("serviceWorker" in navigator) {
          navigator.serviceWorker
            .register("./service-worker.js")
            .then((reg) => console.log("Service Worker registrado", reg.scope))
            .catch((err) =>
              console.error("Error registrando Service Worker", err),
            );
        }
      });
    </script>
  </body>
</html>
